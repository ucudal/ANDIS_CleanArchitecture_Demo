name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Doxygen
        run: |
          wget https://github.com/doxygen/doxygen/releases/download/Release_1_17_0/doxygen-1.17.0.linux.bin.tar.gz
          tar -xzf doxygen-1.17.0.linux.bin.tar.gz
          sudo cp doxygen-1.17.0/bin/doxygen /usr/local/bin/
      - name: Install Graphviz
        run: |
          wget https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/15.0.0/ubuntu_24.04_graphviz-15.0.0-cmake.deb
          sudo dpkg -i ubuntu_24.04_graphviz-15.0.0-cmake.deb
      - name: Show installed versions
        run: |
          echo "Doxygen version:"
          doxygen --version
          echo ""
          echo "Graphviz version:"
          dot -V
      - name: Generate Documentation
        run: cd docs && doxygen Doxyfile
      - name: Copy doxygen-awesome files
        run: cp -r doxygen-awesome-css/doxygen-awesome*.{css,js} docs/html/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
